<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>racerbot camera</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    img {
      max-width: 100vw;
      max-height: 100vh;
    }
  </style>
</head>
<body>
  <!-- The browser renders this exactly like a static image, but the
       server never ends the HTTP response -- it just keeps streaming new
       multipart JPEG frames down the same connection forever. No JS
       needed at all. See docs/usb-camera-livestream.md. -->
  <img src="/stream" alt="camera stream" />
</body>
</html>
