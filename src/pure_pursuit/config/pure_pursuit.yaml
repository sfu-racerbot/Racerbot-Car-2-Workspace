pure_pursuit_node:
  ros__parameters:
    # --- Required: set this before racing. No "real" default is provided
    # on purpose -- an empty/missing waypoints file makes the node refuse
    # to start rather than silently drive nothing, or an old/wrong track.
    waypoints_file: ''
    closed_loop: true

    # --- Topics ---
    pose_topic: /pf/viz/inferred_pose   # geometry_msgs/PoseStamped, published by particle_filter
    scan_topic: /scan
    drive_topic: /drive

    # --- Control loop ---
    control_rate_hz: 40.0
    wheelbase: 0.25          # meters -- matches src/f1tenth_system/f1tenth_stack/config/vesc.yaml

    # --- Pure pursuit geometry ---
    min_lookahead: 0.6           # meters, lookahead distance at v=0
    max_lookahead: 2.5           # meters, lookahead distance cap at high speed
    lookahead_speed_gain: 0.35   # meters per (m/s): L_d = gain*v + min_lookahead, clipped to [min,max]
    nearest_search_window: 40    # +/- waypoints searched around the previous tick's nearest point (0 = search all)

    # --- Speed limits (safety ceiling -- the .csv profile is still clipped to this) ---
    max_speed: 4.0
    min_speed: 0.5

    # --- Steering limit ---
    # Derived from this car's actual servo calibration in vesc.yaml:
    #   servo = -1.2135 * steering_angle + 0.5304, servo clamped to [0.15, 0.85]
    # Solving both ends: +0.313 rad at servo=0.15, -0.263 rad at servo=0.85.
    # Using the smaller magnitude (0.26) keeps every command physically
    # achievable in both directions, with a small margin. Re-derive this
    # if vesc.yaml's gain/offset/servo_min/servo_max ever change.
    max_steering_angle: 0.26

    # --- Safety watchdogs ---
    pose_timeout_sec: 0.5         # stop if localization hasn't updated within this long
    max_cross_track_error: 1.0    # stop if further than this from every waypoint (lost/kidnapped)

    # --- Reactive LIDAR safety net (independent of the planned line -- for
    # opponents, spun-out cars, or anything else not in the map) ---
    enable_lidar_safety: true
    safety_fov_deg: 60.0
    emergency_stop_distance: 0.4
    scan_timeout_sec: 0.5
    max_range: 10.0   # range readings beyond this (and inf/NaN) are clipped/filled before any math touches them

    # --- Reactive avoidance: steer *around* something in a wider cone,
    # instead of just stopping, whenever there's room to -- the hard-stop
    # net above still wins if it's too close for this to be safe. ---
    enable_obstacle_avoidance: true
    avoidance_fov_deg: 100.0
    avoidance_trigger_distance: 1.5
    avoidance_min_gap_distance: 1.0
    avoidance_speed: 1.0

    # --- Opponent detection, tracking, and overtaking -- see
    # docs/racing-autonomy.md's "Racing against opponents" for the full
    # strategy. Requires enable_lidar_safety above to also be true. ---
    enable_opponent_overtake: true
    opponent_min_width: 0.15          # meters -- narrower than this is noise/a thin post, not a car
    opponent_max_width: 0.7           # meters -- wider than this is treated as a wall, not a car
    opponent_cluster_gap: 0.3         # meters -- a range jump bigger than this splits one cluster into two
    opponent_engagement_range: 5.0    # meters -- ignore anything farther away for now
    opponent_open_side_margin: 0.5    # meters -- how much more open the surroundings must be to count as "isolated"
    opponent_velocity_smoothing: 0.3  # 0-1: higher = more responsive but noisier track-progress-rate estimate
    opponent_lost_timeout_sec: 1.0    # forget the tracked opponent if it isn't re-detected within this long
    overtake_trigger_gap: 3.0         # meters of *track distance* -- start considering a pass once this close
    overtake_closing_margin: 0.3      # m/s -- must be closing at least this fast to bother attempting a pass
    overtake_clear_margin: 1.0        # meters of track distance past the opponent before resuming the racing line
    overtake_lateral_offset: 0.5      # meters, sideways nudge to the steering target while passing
    laser_offset_x: 0.27              # meters -- LIDAR mounting offset from base_link, matches hardware-reference.md
    laser_offset_y: 0.0

    # --- Deadman button (workspace policy -- see docs/architecture.md) ---
    # Mandatory workspace-wide safety policy: the car must not move under
    # any code, autonomous or manual, unless LB is held on the physical
    # controller. This is checked first, ahead of every other watchdog
    # above. Stays enabled until the team has enough confidence in the
    # car's behavior to deliberately relax it -- don't set false otherwise.
    enable_deadman: true
    joy_topic: /joy
    deadman_button: 4
    joy_timeout_sec: 0.5
